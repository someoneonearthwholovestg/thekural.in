<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <!-- ─── GOOGLE FONTS ─── -->
  {% assign f = site.fonts %}
  {% assign all_fonts = f.post_heading | append: "|" | append: f.post_subheading | append: "|" | append: f.body | append: "|" | append: f.ui | append: "|" | append: f.mono %}
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family={{ f.post_heading | replace: ' ', '+' }}:ital,wght@0,300;0,400;0,600;0,700;1,400;1,700&family={{ f.body | replace: ' ', '+' }}:ital,wght@0,400;0,600;1,400&family={{ f.ui | replace: ' ', '+' }}:wght@300;400;500;600&family={{ f.mono | replace: ' ', '+' }}:wght@400;500&display=swap" rel="stylesheet" />

  <!-- ─── ICONS (Lucide) ─── -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>if(window.lucide) lucide.createIcons();</script>

  <!-- ─── CSS CUSTOM PROPERTIES (from _config.yml) ─── -->
  <style>
    :root {
      /* Fonts */
      --font-heading:    "{{ site.fonts.post_heading }}", Georgia, serif;
      --font-subheading: "{{ site.fonts.post_subheading }}", Georgia, serif;
      --font-body:       "{{ site.fonts.body }}", Georgia, serif;
      --font-ui:         "{{ site.fonts.ui }}", system-ui, sans-serif;
      --font-mono:       "{{ site.fonts.mono }}", monospace;

      /* Font sizes */
      --fs-post-heading: {{ site.font_sizes.post_heading }};
      --fs-card-heading: {{ site.font_sizes.card_heading }};
      --fs-subheading:   {{ site.font_sizes.subheading }};
      --fs-body:         {{ site.font_sizes.body }};
      --fs-ui:           {{ site.font_sizes.ui }};

      /* Light mode colours */
      --c-primary:       {{ site.colors.primary }};
      --c-primary-dark:  {{ site.colors.primary_dark }};
      --c-bg:            {{ site.colors.bg }};
      --c-surface:       {{ site.colors.surface }};
      --c-text:          {{ site.colors.text }};
      --c-text-muted:    {{ site.colors.text_muted }};
      --c-border:        {{ site.colors.border }};
      --c-accent:        {{ site.colors.accent }};

      /* Derived tokens */
      --c-surface-hover: color-mix(in srgb, var(--c-primary) 6%, var(--c-surface));
      --shadow-sm:  0 1px 3px rgba(44,21,8,.06), 0 1px 2px rgba(44,21,8,.04);
      --shadow-md:  0 4px 16px rgba(44,21,8,.08), 0 2px 6px rgba(44,21,8,.05);
      --shadow-lg:  0 12px 40px rgba(44,21,8,.12), 0 4px 12px rgba(44,21,8,.07);
      --radius:     10px;
      --radius-lg:  16px;
      --transition: 0.22s cubic-bezier(.4,0,.2,1);
    }

    /* ─── DARK MODE ─── */
    [data-theme="dark"] {
      --c-bg:          #130C06;
      --c-surface:     #1C1008;
      --c-text:        #F0E8DC;
      --c-text-muted:  #9A7A5A;
      --c-border:      #3A2010;
      --c-primary:     #D4A96A;
      --c-primary-dark:#E8C080;
      --c-accent:      #E0B878;
      --c-surface-hover: color-mix(in srgb, var(--c-primary) 10%, var(--c-surface));
      --shadow-sm:  0 1px 3px rgba(0,0,0,.3);
      --shadow-md:  0 4px 16px rgba(0,0,0,.35);
      --shadow-lg:  0 12px 40px rgba(0,0,0,.45);
    }

    /* ─── RESET & BASE ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      font-size: var(--fs-body);
      background: var(--c-bg);
      color: var(--c-text);
      line-height: 1.75;
      transition: background var(--transition), color var(--transition);
      min-height: 100vh;
    }

    /* ─── NOISE TEXTURE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: .4;
    }

    a { color: var(--c-primary); text-decoration: none; transition: color var(--transition); }
    a:hover { color: var(--c-primary-dark); }
    img { max-width: 100%; height: auto; display: block; }

    /* ─── TYPOGRAPHY ─── */
    h1, h2, h3, h4 {
      font-family: var(--font-heading);
      color: var(--c-text);
      line-height: 1.2;
    }
    h1 { font-size: var(--fs-post-heading); font-weight: 700; }
    h2 { font-family: var(--font-subheading); font-size: var(--fs-subheading); font-weight: 600; }
    h3 { font-size: 1.15rem; font-weight: 600; }

    p { margin-bottom: 1.4rem; }
    strong { font-weight: 600; color: var(--c-text); }
    em { font-style: italic; color: var(--c-text-muted); }

    code {
      font-family: var(--font-mono);
      font-size: .88em;
      background: color-mix(in srgb, var(--c-primary) 12%, var(--c-surface));
      color: var(--c-primary-dark);
      padding: .15em .45em;
      border-radius: 4px;
    }
    pre {
      background: color-mix(in srgb, var(--c-text) 95%, var(--c-bg));
      border-radius: var(--radius);
      padding: 1.5rem;
      overflow-x: auto;
      margin: 2rem 0;
    }
    pre code { background: none; color: #F0E8DC; padding: 0; }

    blockquote {
      border-left: 3px solid var(--c-primary);
      padding: .8rem 1.5rem;
      margin: 2rem 0;
      font-style: italic;
      color: var(--c-text-muted);
      background: var(--c-surface);
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    hr { border: none; border-top: 1px solid var(--c-border); margin: 2.5rem 0; }

    /* ─── WRAPPER ─── */
    .container { max-width: 1160px; margin: 0 auto; padding: 0 1.5rem; }
    .container-narrow { max-width: 720px; margin: 0 auto; padding: 0 1.5rem; }

    /* ─── POST PAGE ─── */
    .post-hero {
      padding: 3.5rem 0 2.5rem;
    }
    .post-hero-meta {
      font-family: var(--font-ui);
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: .8rem;
    }
    .post-hero-title {
      font-family: var(--font-heading);
      font-size: var(--fs-post-heading);
      font-weight: 700;
      letter-spacing: -.03em;
      line-height: 1.12;
      margin-bottom: 1.4rem;
    }
    .post-cover {
      margin: 0 0 3rem;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--c-border);
      max-height: 520px;
    }
    .post-cover img { width: 100%; height: 520px; object-fit: cover; }
    .post-body { font-size: var(--fs-body); line-height: 1.8; }
    .post-body h2 {
      font-family: var(--font-subheading);
      font-size: var(--fs-subheading);
      margin: 2.5rem 0 .9rem;
      color: var(--c-text);
    }
    .post-body h3 {
      font-family: var(--font-subheading);
      font-size: 1.15rem;
      margin: 2rem 0 .7rem;
      color: var(--c-text);
    }
    .post-body img {
      border-radius: var(--radius);
      margin: 2rem 0;
      border: 1px solid var(--c-border);
    }
    .post-body ul, .post-body ol {
      padding-left: 1.5rem;
      margin-bottom: 1.4rem;
    }
    .post-body li { margin-bottom: .4rem; }
    .post-tags { display: flex; gap: .5rem; flex-wrap: wrap; margin: 2.5rem 0; }
    .post-author {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin: 3rem 0;
    }
    .author-avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--c-primary);
      flex-shrink: 0;
    }
    .author-name { font-family: var(--font-heading); font-size: 1.1rem; font-weight: 700; }
    .author-bio { font-size: .9rem; color: var(--c-text-muted); margin-top: .2rem; }

    /* ─── FOOTER ─── */
    .site-footer {
      margin-top: 5rem;
      border-top: 1px solid var(--c-border);
      padding: 2.5rem 0 2rem;
    }
    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .footer-logo { font-family: var(--font-heading); font-size: 1.2rem; font-weight: 700; }
    .footer-logo span { color: var(--c-primary); }
    .footer-copy {
      font-family: var(--font-ui);
      font-size: .82rem;
      color: var(--c-text-muted);
      text-align: center;
    }

    /* ─── MOBILE ─── */
    @media (max-width: 900px) {
      .posts-grid { grid-template-columns: repeat(2, 1fr); }
      .posts-grid .post-card:first-child { grid-column: auto; flex-direction: column; }
      .posts-grid .post-card:first-child .post-card-img { width: 100%; aspect-ratio: 16/9; }
    }
    @media (max-width: 640px) {
      .posts-grid { grid-template-columns: 1fr; }
      .post-card.featured { flex-direction: column; }
      .post-card.featured .post-card-img { width: 100%; aspect-ratio: 16/9; }
      .header-nav { display: none; }
      .hero-title { font-size: 2.2rem; }
      .footer-inner { flex-direction: column; text-align: center; }
    }

    /* ─── EXPLORE PAGE ─── */
    .explore-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.4rem;
      margin: 2rem 0;
    }
    @media (max-width: 900px) { .explore-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .explore-grid { grid-template-columns: 1fr; } }

    /* ─── ABOUT PAGE ─── */
    .about-hero {
      padding: 4rem 0 3rem;
      display: flex;
      gap: 4rem;
      align-items: center;
    }
    .about-avatar-wrap {
      flex-shrink: 0;
      width: 200px; height: 200px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid var(--c-primary);
      box-shadow: var(--shadow-md);
    }
    .about-avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .about-name { font-family: var(--font-heading); font-size: 2.5rem; font-weight: 700; margin-bottom: .5rem; }
    .about-tagline { color: var(--c-primary); font-style: italic; font-size: 1.1rem; margin-bottom: 1rem; }
    @media (max-width: 700px) { .about-hero { flex-direction: column; gap: 2rem; text-align: center; } }

    /* ─── MISC UTILITY ─── */
    .divider { height: 1px; background: var(--c-border); margin: 3rem 0; }
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      font-family: var(--font-ui); font-size: .88rem; font-weight: 600;
      padding: .65rem 1.4rem;
      border-radius: 8px;
      border: 1px solid var(--c-border);
      background: var(--c-surface);
      color: var(--c-text);
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn:hover { border-color: var(--c-primary); background: var(--c-surface-hover); color: var(--c-text); }
    .btn-primary {
      background: var(--c-primary);
      border-color: var(--c-primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--c-primary-dark); border-color: var(--c-primary-dark); color: #fff; }

    /* scroll fade-in */
    .fade-in { opacity: 0; transform: translateY(20px); transition: opacity .55s ease, transform .55s ease; }
    .fade-in.visible { opacity: 1; transform: none; }
  </style>

  {{ page.extra_css }}
</head>

<body>
  <main>
    {{ content }}
  </main>


  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>

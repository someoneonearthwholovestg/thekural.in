<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #f8f9fa; color: #333; }
    main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 2rem; }
    article { margin-bottom: 2rem; }
    h1 a, h2 a { color: #2c3e50; text-decoration: none; }
    h1 a:hover, h2 a:hover { color: #3498db; }
    .meta { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .read-more { display: inline-block; margin-top: 0.5rem; color: #3498db; text-decoration: none; font-weight: 500; }
    .read-more:hover { text-decoration: underline; }
  </style>
</head>
<body>
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}
</body>
</html>

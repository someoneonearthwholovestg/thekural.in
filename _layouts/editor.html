<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  {% include head-vars.html %}

  <!-- Editor base reset (no noise, minimal body) -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body); font-size: var(--fs-body);
      background: var(--c-bg); color: var(--c-text); line-height: 1.75;
      transition: background var(--transition), color var(--transition);
      min-height: 100vh;
    }
    a { color: var(--c-primary); text-decoration: none; }
    a:hover { color: var(--c-primary-dark); }
    img { max-width: 100%; height: auto; display: block; }
    h1, h2, h3, h4 { font-family: var(--font-heading); color: var(--c-text); line-height: 1.2; }
    p { margin-bottom: 1.4rem; }
    code { font-family: var(--font-mono); font-size: .88em; background: color-mix(in srgb, var(--c-primary) 12%, var(--c-surface)); color: var(--c-primary-dark); padding: .15em .45em; border-radius: 4px; }
    pre { background: color-mix(in srgb, var(--c-text) 95%, var(--c-bg)); border-radius: var(--radius); padding: 1.5rem; overflow-x: auto; margin: 2rem 0; }
    pre code { background: none; color: #F0E8DC; padding: 0; }
    blockquote { border-left: 3px solid var(--c-primary); padding: .8rem 1.5rem; margin: 2rem 0; font-style: italic; color: var(--c-text-muted); background: var(--c-surface); border-radius: 0 var(--radius) var(--radius) 0; }
    .container { max-width: 1160px; margin: 0 auto; padding: 0 1.5rem; }
    .container-narrow { max-width: 720px; margin: 0 auto; padding: 0 1.5rem; }
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      font-family: var(--font-ui); font-size: .88rem; font-weight: 600;
      padding: .65rem 1.4rem; border-radius: 8px;
      border: 1px solid var(--c-border); background: var(--c-surface);
      color: var(--c-text); cursor: pointer; transition: all var(--transition);
    }
    .btn:hover { border-color: var(--c-primary); background: var(--c-surface-hover); }
    .btn-primary { background: var(--c-primary); border-color: var(--c-primary); color: #fff; }
    .btn-primary:hover { background: var(--c-primary-dark); border-color: var(--c-primary-dark); }
    [data-theme="dark"] { --c-bg: #1A1405; --c-surface: #241B08; --c-text: #FFF6D6; --c-text-muted: #C9B458; --c-border: #4A3A10; --c-primary: #FFD54F; --c-primary-dark: #FFCA28; }
  </style>

  {{ page.extra_css }}
</head>
<body>
  <main>{{ content }}</main>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>

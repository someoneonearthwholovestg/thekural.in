<!-- _includes/base-styles.html
     All shared component styles used across the site.
     Included inside a <style> tag in layout files. -->
<style>
  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  * { scrollbar-width: none; }
  *::-webkit-scrollbar { display: none; }

  body {
    font-family: var(--font-body);
    font-size: var(--fs-body);
    background: var(--c-bg);
    color: var(--c-text);
    line-height: 1.75;
    transition: background var(--transition), color var(--transition);
    min-height: 100vh;
  }

  /* Paper noise texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: .4;
  }

  a { color: var(--c-primary); text-decoration: none; transition: color var(--transition); }
  a:hover { color: var(--c-primary-dark); }
  img { max-width: 100%; height: auto; display: block; }

  /* ── TYPOGRAPHY ── */
  h1, h2, h3, h4 { font-family: var(--font-heading); color: var(--c-text); line-height: 1.2; }
  h1 { font-size: var(--fs-post-heading); font-weight: 700; }
  h2 { font-family: var(--font-subheading); font-size: var(--fs-subheading); font-weight: 600; }
  h3 { font-size: 1.15rem; font-weight: 600; }
  p  { margin-bottom: 1.4rem; }
  strong { font-weight: 600; color: var(--c-text); }
  em     { font-style: italic; color: var(--c-text-muted); }

  code {
    font-family: var(--font-mono); font-size: .88em;
    background: color-mix(in srgb, var(--c-primary) 12%, var(--c-surface));
    color: var(--c-primary-dark);
    padding: .15em .45em; border-radius: 4px;
  }
  pre {
    background: color-mix(in srgb, var(--c-text) 95%, var(--c-bg));
    border-radius: var(--radius); padding: 1.5rem; overflow-x: auto; margin: 2rem 0;
  }
  pre code { background: none; color: #F0E8DC; padding: 0; }

  blockquote {
    border-left: 3px solid var(--c-primary);
    padding: .8rem 1.5rem; margin: 2rem 0;
    font-style: italic; color: var(--c-text-muted);
    background: var(--c-surface);
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  hr { border: none; border-top: 1px solid var(--c-border); margin: 2.5rem 0; }

  /* ── WRAPPERS ── */
  .container        { max-width: 1160px; margin: 0 auto; padding: 0 1.5rem; }
  .container-narrow { max-width: 720px;  margin: 0 auto; padding: 0 1.5rem; }

  /* ── HEADER ── */
  .site-header {
    position: sticky; top: 0; z-index: 100;
    background: color-mix(in srgb, var(--c-bg) 88%, transparent);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border-bottom: 1px solid var(--c-border);
    transition: background var(--transition);
  }
  .header-inner { display: flex; align-items: center; gap: 1rem; height: 64px; }
  .site-logo {
    font-family: var(--font-heading); font-size: 1.55rem; font-weight: 700;
    color: var(--c-text) !important; letter-spacing: -.02em; flex-shrink: 0;
  }
  .site-logo span { color: var(--c-primary); }
  .header-nav { display: flex; align-items: center; gap: .2rem; margin-left: 1.5rem; }
  .nav-link {
    font-family: var(--font-ui); font-size: var(--fs-ui); font-weight: 500;
    color: var(--c-text-muted) !important;
    padding: .4rem .75rem; border-radius: 6px;
    transition: background var(--transition), color var(--transition);
    letter-spacing: .02em; text-transform: uppercase;
  }
  .nav-link:hover, .nav-link.active { color: var(--c-text) !important; background: var(--c-surface); }
  .header-actions { display: flex; align-items: center; gap: .5rem; margin-left: auto; }
  .header-search-btn {
    display: flex; align-items: center; gap: .5rem;
    background: transparent; border: 1px solid var(--c-border);
    border-radius: 8px; padding: 0 1rem; height: 38px;
    width: clamp(120px, 33vw, 340px);
    font-family: var(--font-ui); font-size: var(--fs-ui); font-weight: 500;
    color: var(--c-text-muted); cursor: pointer; transition: all var(--transition);
  }
  .header-search-btn:hover { background: var(--c-surface); color: var(--c-text); border-color: var(--c-primary); }
  .icon-btn {
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--c-border); border-radius: 8px;
    background: transparent; color: var(--c-text-muted); cursor: pointer;
    transition: all var(--transition);
  }
  .icon-btn:hover { background: var(--c-surface); color: var(--c-text); border-color: var(--c-primary); }
  .icon-btn svg { width: 16px; height: 16px; }
  .icon-sun { display: none; }
  [data-theme="dark"] .icon-sun  { display: block; }
  [data-theme="dark"] .icon-moon { display: none; }

  /* ── DROPDOWN NAV ── */
  .nav-dropdown { position: relative; }
  .dropdown-toggle {
    font-family: var(--font-ui); font-size: var(--fs-ui); font-weight: 500;
    color: var(--c-text-muted) !important;
    padding: .4rem .75rem; border-radius: 6px;
    border: none; background: transparent; cursor: pointer;
    display: flex; align-items: center;
    transition: background var(--transition), color var(--transition);
    letter-spacing: .02em; text-transform: uppercase;
  }
  .dropdown-toggle:hover, .nav-dropdown.open .dropdown-toggle { color: var(--c-text) !important; background: var(--c-surface); }
  .nav-dropdown.open .dropdown-toggle svg { transform: rotate(180deg); }
  .dropdown-menu {
    position: absolute; top: calc(100% + .5rem); left: 0;
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: var(--radius); box-shadow: var(--shadow-lg);
    min-width: 160px; z-index: 200; overflow: hidden;
    flex-direction: column; display: none;
  }
  .nav-dropdown.open .dropdown-menu { display: flex; }
  .dropdown-item {
    font-family: var(--font-ui); font-size: .82rem;
    color: var(--c-text-muted) !important;
    padding: .6rem 1rem;
    transition: background var(--transition), color var(--transition);
  }
  .dropdown-item:hover { background: var(--c-surface-hover); color: var(--c-text) !important; }

  /* ── MOBILE NAV ── */
  .mobile-nav {
    position: absolute; top: 64px; left: 0; right: 0; z-index: 99;
    background: var(--c-surface); border-bottom: 1px solid var(--c-border);
    max-height: 0; overflow: hidden;
    transition: max-height .35s cubic-bezier(.4,0,.2,1), opacity .3s ease;
    opacity: 0;
  }
  .mobile-nav.open { max-height: 600px; opacity: 1; }
  .mobile-nav-inner { padding: .75rem 1.5rem 1.25rem; display: flex; flex-direction: column; gap: .15rem; }
  .mobile-nav-link {
    font-family: var(--font-ui); font-size: .9rem; font-weight: 500;
    color: var(--c-text-muted) !important; padding: .55rem .5rem; border-radius: 6px;
    transition: background var(--transition), color var(--transition);
  }
  .mobile-nav-link:hover { color: var(--c-text) !important; background: var(--c-surface-hover); }
  .mobile-nav-group { margin-top: .5rem; }
  .mobile-nav-group-label {
    font-family: var(--font-ui); font-size: .65rem; font-weight: 700;
    letter-spacing: .14em; text-transform: uppercase; color: var(--c-primary);
    padding: .3rem .5rem;
  }
  .mobile-nav-child { padding-left: 1rem; }
  @media (max-width: 640px) { #desktop-nav { display: none; } #mobile-menu-toggle { display: flex !important; } }

  /* ── SEARCH OVERLAY ── */
  .search-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,.5); backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none;
    transition: opacity var(--transition);
    display: flex; align-items: center; justify-content: center;
  }
  .search-overlay.open { opacity: 1; pointer-events: all; }
  .search-box {
    width: min(780px, 94vw); background: var(--c-surface);
    border: 1px solid var(--c-border); border-radius: 50px;
    box-shadow: var(--shadow-lg); overflow: hidden;
    transform: scale(.96); transition: transform var(--transition);
  }
  .search-overlay.open .search-box { transform: scale(1); }
  .search-input-wrap { display: flex; align-items: center; padding: 0 2rem; gap: 1rem; }
  .search-input-wrap svg { color: var(--c-text-muted); width: 22px; height: 22px; flex-shrink: 0; }
  #search-input {
    flex: 1; border: none; background: transparent;
    font-family: var(--font-ui); font-size: 1.1rem; color: var(--c-text);
    padding: 1.2rem 0; outline: none;
  }
  #search-input::placeholder { color: var(--c-text-muted); opacity: .7; }
  .search-results { max-height: 55vh; overflow-y: auto; border-top: 1px solid var(--c-border); border-radius: 0 0 50px 50px; }
  .search-result-item {
    display: flex; flex-direction: column;
    padding: 1rem 2rem; border-bottom: 1px solid var(--c-border);
    cursor: pointer; transition: background var(--transition);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--c-surface-hover); }
  .search-result-title { font-family: var(--font-heading); font-size: 1.05rem; color: var(--c-text); }
  .search-result-excerpt { font-size: .85rem; color: var(--c-text-muted); margin-top: .25rem; font-family: var(--font-ui); line-height: 1.5; }
  .search-empty { padding: 2rem; text-align: center; color: var(--c-text-muted); font-family: var(--font-ui); font-size: .9rem; }

  /* ── POST CARDS ── */
  .post-card {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: var(--radius-lg); overflow: hidden;
    transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    display: flex; flex-direction: column;
  }
  .post-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--c-primary); }
  .post-card-img { aspect-ratio: 16/9; overflow: hidden; background: color-mix(in srgb, var(--c-primary) 15%, var(--c-surface)); }
  .post-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s ease; }
  .post-card:hover .post-card-img img { transform: scale(1.04); }
  .post-card-body { padding: 1.4rem 1.5rem 1.6rem; flex: 1; display: flex; flex-direction: column; }
  .post-card-meta {
    display: flex; align-items: center; gap: .6rem;
    font-family: var(--font-ui); font-size: .78rem; color: var(--c-text-muted);
    text-transform: uppercase; letter-spacing: .06em; margin-bottom: .75rem;
  }
  .post-card-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--c-border); }
  .post-card-title {
    font-family: var(--font-heading); font-size: var(--fs-card-heading); font-weight: 700;
    color: var(--c-text); line-height: 1.25; margin-bottom: .7rem; transition: color var(--transition);
  }
  .post-card:hover .post-card-title { color: var(--c-primary); }
  .post-card-excerpt { font-size: .95rem; color: var(--c-text-muted); line-height: 1.6; flex: 1; }
  .post-card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid var(--c-border);
  }
  .tag-list { display: flex; gap: .4rem; flex-wrap: wrap; }
  .tag {
    font-family: var(--font-ui); font-size: .72rem; font-weight: 500;
    background: color-mix(in srgb, var(--c-primary) 14%, var(--c-bg));
    color: var(--c-primary-dark); padding: .2rem .6rem; border-radius: 20px;
    letter-spacing: .03em; transition: background var(--transition);
  }
  .tag:hover { background: color-mix(in srgb, var(--c-primary) 24%, var(--c-bg)); }
  .read-more-arrow {
    font-family: var(--font-ui); font-size: .82rem; font-weight: 600;
    color: var(--c-primary); display: flex; align-items: center; gap: .3rem;
    transition: gap var(--transition);
  }
  .post-card:hover .read-more-arrow { gap: .6rem; }

  /* Featured / first card (full-width row) */
  .posts-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.6rem;
  }
  .posts-grid .post-card:first-child { grid-column: 1 / -1; flex-direction: row; }
  .posts-grid .post-card:first-child .post-card-img { width: 42%; flex-shrink: 0; aspect-ratio: auto; }
  .posts-grid .post-card:first-child .post-card-title { font-size: 1.9rem; }
  .posts-grid .post-card:first-child .post-card-body { padding: 2rem 2.2rem; justify-content: center; }

  /* ── HERO ── */
  .hero { padding: 5rem 0 3.5rem; text-align: center; position: relative; }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, color-mix(in srgb, var(--c-primary) 12%, transparent), transparent);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-family: var(--font-ui); font-size: .78rem; font-weight: 600;
    letter-spacing: .18em; text-transform: uppercase; color: var(--c-primary); margin-bottom: 1rem;
  }
  .hero-title {
    font-family: var(--font-heading); font-size: clamp(2.5rem, 5vw, 4.2rem);
    font-weight: 700; letter-spacing: -.03em; line-height: 1.1; margin-bottom: 1.2rem; color: var(--c-text);
  }
  .hero-title em { font-style: italic; color: var(--c-primary); }
  .hero-sub { font-size: 1.1rem; color: var(--c-text-muted); max-width: 500px; margin: 0 auto 2rem; line-height: 1.65; }

  .section-label {
    font-family: var(--font-ui); font-size: .72rem; font-weight: 600;
    letter-spacing: .18em; text-transform: uppercase; color: var(--c-primary);
    display: flex; align-items: center; gap: .75rem; margin-bottom: 1.5rem;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--c-border); }

  /* ── POST PAGE ── */
  .post-hero-meta {
    font-family: var(--font-ui); font-size: .8rem; font-weight: 500;
    letter-spacing: .08em; text-transform: uppercase; color: var(--c-text-muted);
    margin-bottom: 1.2rem; display: flex; align-items: center; gap: .8rem;
  }
  .post-hero-title {
    font-family: var(--font-heading); font-size: var(--fs-post-heading);
    font-weight: 700; letter-spacing: -.03em; line-height: 1.12; margin-bottom: 1.4rem;
  }
  .post-cover { margin: 0 0 3rem; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--c-border); max-height: 520px; }
  .post-cover img { width: 100%; height: 520px; object-fit: cover; }
  .post-body { font-size: var(--fs-body); line-height: 1.8; }
  .post-body h2 { font-family: var(--font-subheading); font-size: var(--fs-subheading); margin: 2.5rem 0 .9rem; }
  .post-body h3 { font-family: var(--font-subheading); font-size: 1.15rem; margin: 2rem 0 .7rem; }
  .post-body img { border-radius: var(--radius); margin: 2rem 0; border: 1px solid var(--c-border); }
  .post-body figure { margin: 2rem 0; }
  .post-body figure img { margin: 0; }
  .post-body figcaption { font-family: var(--font-ui); font-size: .8rem; color: var(--c-text-muted); text-align: center; padding: .5rem 0; font-style: italic; }
  .post-body ul, .post-body ol { padding-left: 1.5rem; margin-bottom: 1.4rem; }
  .post-body li { margin-bottom: .4rem; }
  .post-tags { display: flex; gap: .5rem; flex-wrap: wrap; margin: 2.5rem 0; }
  .post-author {
    display: flex; align-items: center; gap: 1.2rem;
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: var(--radius-lg); padding: 1rem;
  }
  .author-avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--c-primary); flex-shrink: 0; }
  .author-name { font-family: var(--font-heading); font-size: 1.1rem; font-weight: 700; }
  .author-bio  { font-size: .9rem; color: var(--c-text-muted); margin-top: .2rem; }

  /* ── FOOTER ── */
  .site-footer { background: #000; padding: 3rem 0 0; }
  .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; padding-bottom: 2.5rem; border-bottom: 1px solid #222; }
  .footer-brand { display: flex; flex-direction: column; gap: .75rem; align-items: center; text-align: center; }
  .footer-logo { font-family: var(--font-heading); font-size: 1.5rem; font-weight: 700; color: #fff; }
  .footer-logo span { color: var(--c-primary); }
  .footer-tagline { font-family: var(--font-ui); font-size: .78rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--c-primary); }
  .footer-desc { font-family: var(--font-ui); font-size: .84rem; color: #888; line-height: 1.7; max-width: 320px; text-align: center; }
  .footer-nav { display: flex; flex-direction: column; gap: .3rem; align-items: center; }
  .footer-nav-group { display: flex; flex-direction: column; gap: .1rem; margin-top: .5rem; align-items: flex-start; background: rgba(255,255,255,.03); border: 1px solid #222; border-radius: var(--radius); padding: .75rem 1.1rem .85rem; }
  .footer-nav-label { font-family: var(--font-ui); font-size: .65rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--c-primary); padding: .2rem 0; margin-top: .4rem; }
  .footer-nav-link { font-family: var(--font-ui); font-size: .85rem; color: #888 !important; padding: .25rem 0; transition: color var(--transition); }
  .footer-nav-link:hover { color: #fff !important; }
  .footer-nav-child { font-size: .82rem; color: #777 !important; padding: .15rem 0; display: flex; align-items: center; gap: .4rem; }
  .footer-nav-child:hover { color: #ccc !important; }
  .footer-nav-dot { color: var(--c-primary); font-size: .6rem; opacity: .7; flex-shrink: 0; }
  .footer-bottom { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 0; gap: 1rem; flex-wrap: wrap; }
  .footer-socials { display: flex; gap: .5rem; align-items: center; }
  .footer-social-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; border-radius: 8px; color: #888 !important; transition: all var(--transition); background: transparent; }
  .footer-social-btn:hover { border-color: var(--c-primary); color: var(--c-primary) !important; background: color-mix(in srgb, var(--c-primary) 10%, transparent); }
  .footer-copy { font-family: var(--font-ui); font-size: .78rem; color: #555; }
  @media (max-width: 640px) { .footer-grid { grid-template-columns: 1fr; gap: 2rem; } .footer-bottom { flex-direction: column; align-items: flex-start; } }

  /* ── MISC ── */
  .divider { height: 1px; background: var(--c-border); margin: 3rem 0; }
  .btn {
    display: inline-flex; align-items: center; gap: .5rem;
    font-family: var(--font-ui); font-size: .88rem; font-weight: 600;
    padding: .65rem 1.4rem; border-radius: 8px;
    border: 1px solid var(--c-border); background: var(--c-surface);
    color: var(--c-text); cursor: pointer; transition: all var(--transition);
  }
  .btn:hover { border-color: var(--c-primary); background: var(--c-surface-hover); color: var(--c-text); }
  .btn-primary { background: var(--c-primary); border-color: var(--c-primary); color: #fff; }
  .btn-primary:hover { background: var(--c-primary-dark); border-color: var(--c-primary-dark); color: #fff; }

  .explore-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.4rem; margin: 2rem 0; }
  @media (max-width: 900px) { .explore-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .explore-grid { grid-template-columns: 1fr; } }

  .fade-in { opacity: 0; transform: translateY(20px); transition: opacity .55s ease, transform .55s ease; }
  .fade-in.visible { opacity: 1; transform: none; }

  @media (max-width: 900px) {
    .posts-grid { grid-template-columns: repeat(2, 1fr); }
    .posts-grid .post-card:first-child { grid-column: auto; flex-direction: column; }
    .posts-grid .post-card:first-child .post-card-img { width: 100%; aspect-ratio: 16/9; }
  }
  @media (max-width: 640px) {
    .posts-grid { grid-template-columns: 1fr; }
    .header-nav { display: none; }
    .hero-title { font-size: 2.2rem; }
  }
</style>

<!-- _includes/nazar-home.html
     Shows a preview strip of the Nazar gallery on the homepage. -->
{% if site.data.nazar and site.data.nazar.size > 0 %}
<section style="margin: 3rem 0;">
  <div class="nazar-home-wrap">
    <div class="section-label">Nazar — Visual Journal</div>

    <div class="nazar-home-grid">
      {% for item in site.data.nazar limit: 6 %}
        <div class="nazar-home-item">
          <img src="{{ item.url }}" alt="{{ item.caption | default: 'Nazar' }}" loading="lazy" />
          {% if item.caption %}
            <div class="nazar-home-caption">{{ item.caption }}</div>
          {% endif %}
        </div>
      {% endfor %}
    </div>

    <div class="nazar-home-more">
      <a href="{{ '/nazar' | relative_url }}" class="btn">View full gallery →</a>
    </div>
  </div>
</section>

<style>
  .nazar-home-wrap { width: 100%; }
  .nazar-home-grid { columns: 3; column-gap: 10px; width: 100%; }
  @media (max-width: 768px) { .nazar-home-grid { columns: 2; } }
  @media (max-width: 480px) { .nazar-home-grid { columns: 2; } }
  .nazar-home-item {
    break-inside: avoid; margin-bottom: 10px;
    position: relative; border-radius: var(--radius);
    overflow: hidden; border: 1px solid var(--c-border); cursor: pointer;
  }
  .nazar-home-item img { width: 100%; height: auto; display: block; margin: 0; transition: transform .4s ease; }
  .nazar-home-caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,.75), transparent);
    color: #fff; font-family: var(--font-ui); font-size: .72rem;
    padding: 1.2rem .75rem .5rem; opacity: 0;
    transition: opacity .3s, transform .3s; transform: translateY(4px); line-height: 1.4;
  }
  .nazar-home-item:hover img { transform: scale(1.04); }
  .nazar-home-item:hover .nazar-home-caption { opacity: 1; transform: translateY(0); }
  @media (hover: none) {
    .nazar-home-caption { opacity: 1; transform: translateY(0); }
    .nazar-home-item img { transform: none !important; }
  }
  .nazar-home-more { text-align: center; margin-top: 1.5rem; }
</style>
{% endif %}

<header class="site-header">
  <div class="container">
    <div class="header-inner">

      <!-- Logo -->
      <a href="/" class="site-logo">
        The<span>Kural</span>
      </a>

      <!-- Primary Nav -->
      <nav class="header-nav">
        <a href="/"        class="nav-link {% if page.url == '/' %}active{% endif %}">Home</a>
        <a href="/explore" class="nav-link {% if page.url contains 'explore' %}active{% endif %}">Explore</a>
        <a href="/about"   class="nav-link {% if page.url contains 'about' %}active{% endif %}">About</a>
      </nav>

      <!-- Actions -->
      <div class="header-actions">
        <!-- Search -->
        <button class="icon-btn" id="search-toggle" aria-label="Search" title="Search posts">
          <i data-lucide="search"></i>
        </button>

        <!-- Theme toggle -->
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle dark/light mode">
          <i data-lucide="moon" class="icon-moon"></i>
          <i data-lucide="sun"  class="icon-sun"></i>
        </button>
      </div>

    </div>
  </div>
</header>

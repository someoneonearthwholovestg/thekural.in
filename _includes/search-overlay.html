<div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Search">
  <div class="search-box">
    <div class="search-input-wrap">
      <i data-lucide="search"></i>
      <input
        type="text"
        id="search-input"
        placeholder="Search articles…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="icon-btn" id="search-close" style="border:none;background:transparent;" aria-label="Close search">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="search-results" id="search-results">
      <div class="search-empty" id="search-hint">
        <i data-lucide="book-open" style="width:28px;height:28px;margin:0 auto .75rem;display:block;opacity:.4;"></i>
        Start typing to search articles…
      </div>
    </div>
    <div class="search-footer">
      <span>↑↓ navigate</span>
      <span>↵ open</span>
      <span>Esc close</span>
    </div>
  </div>
</div>

# ─────────────────────────────────────────────────────────────────
#  src/config/nav.yml
#  Controls the navigation bar.
#  Folder numbers (1-, 2-...) set the order but are stripped from labels.
#  Items with no "url" become dropdown parents.
# ─────────────────────────────────────────────────────────────────

- label: Home
  url: /

- label: Reading Room
  url: "#"
  children:
    - label: Nazar
      url: /nazar
    - label: Book Reviews
      url: /book-reviews
    - label: Keywords
      url: /keywords
    - label: Criticulture
      url: /criticulture

- label: Submission
  url: /submission

- label: About
  url: /about

# ─────────────────────────────────────────────────────────────
# NOTE: Jekyll reads from /_data/nav.yml (at the project root).
# This file at src/config/nav.yml is the human-readable source.
# After editing here, copy to /_data/nav.yml and commit both.
# ─────────────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════════════
#  THEKURAL — SITE CONFIGURATION
# ═══════════════════════════════════════════════════════════════

title:        "TheKural"
tagline:      "Stories worth telling"
description:  "A thoughtful space for ideas, stories, and perspectives."
url:          "https://someoneonearthwholovestg.github.io"
baseurl:      "/thekural.in"
lang:         "en"
logo:         "/assets/images/logo.png"

# ─── AUTHOR ────────────────────────────────────────────────────
author:
  name:   "The Kural"
  bio:    "Voices & Perceptions"
  avatar: "/assets/images/about.png"

# ─── JEKYLL CORE ───────────────────────────────────────────────
markdown:    kramdown
highlighter: rouge
permalink:   /:categories/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# ─── DATA FILES ───────────────────────────────────────────────
# Jekyll reads from _data/ by default (GitHub Pages compatible).
# Edit _data/nav.yml, _data/authors.yml, _data/nazar.yml.
# The same files are mirrored at src/config/ for clarity —
# but _data/ is what Jekyll actually uses.

# ─── TYPOGRAPHY ────────────────────────────────────────────────
fonts:
  post_heading:    "Caveat"
  post_subheading: "Kalam"
  body:            "Patrick Hand"
  ui:              "Architects Daughter"
  mono:            "JetBrains Mono"

font_sizes:
  post_heading: "3.4rem"
  card_heading: "1.45rem"
  subheading:   "1.3rem"
  body:         "1.1rem"
  ui:           "0.88rem"

# ─── COLORS (LIGHT MODE) ───────────────────────────────────────
colors:
  primary:      "#4A4A4A"
  primary_dark: "#2E2E2E"
  bg:           "#FFFFFF"
  surface:      "#F5F5F5"
  text:         "#1A1A1A"
  text_muted:   "#8A8A8A"
  border:       "#E0E0E0"
  accent:       "#BDBDBD"
  footer:       "#000000"

# ─── FEATURES ──────────────────────────────────────────────────
show_reading_time: true
show_tags:         true
posts_per_page:    9
default_image:     "/assets/images/default-cover.png"

# ─── COLLECTIONS ───────────────────────────────────────────────
# Posts live in _posts/ as usual.
# Section-specific editors and pages live in src/
# Collection keys MUST match the folder names exactly (including numbers)

collections_dir: src/2-reading-room
 
collections:
  # Articles inside Nazar quarters
  1-nazar:
    output: true
    permalink: /nazar/:path/        # → /nazar/2026-Q1/article-slug/
 
# Quarter index pages live at the root in _quarters/
# (not inside collections_dir, so declare them separately)
collections:
  quarters:
    output: true
    permalink: /nazar/:name/        # → /nazar/2026-Q1/  (name = filename without .md)
  1-nazar:
    output: true
    permalink: /nazar/:path/        # → /nazar/2026-Q1/article-slug/
 
# ── Default front-matter ───────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: "1-nazar"
    values:
      layout: nazar-post
 
  - scope:
      path: ""
      type: "quarters"
    values:
      layout: nazar-quarter
 

# ─── NAVIGATION (auto-built from folder names) ─────────────────
# Edit src/config/nav.yml to control the nav bar.

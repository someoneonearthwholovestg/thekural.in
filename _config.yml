# ═══════════════════════════════════════════════════════════════════
#  THEKURAL — SITE CONFIGURATION
#  Edit the sections below to fully customise your blog.
# ═══════════════════════════════════════════════════════════════════

title:        "TheKural"
tagline:      "Stories worth telling"
description:  "A thoughtful space for ideas, stories, and perspectives."
url:          "https://someoneonearthwholovestg.github.io"
baseurl:      "/thekural.in"
lang:         "en"
twitter:
  username:   "yourtwitterhandle"
logo:         "/assets/images/logo.png"

# ─── AUTHOR ────────────────────────────────────────────────────────
author:
  name:   "The Kural"
  bio:    "Voices & Perceptions"
  avatar: "/assets/images/about.png"   # Put your photo in assets/images/

# ─── JEKYLL CORE ───────────────────────────────────────────────────
markdown:   kramdown
highlighter: rouge
permalink:  /:categories/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  
# ─── TYPOGRAPHY ────────────────────────────────────────────────────
# Change to any Google Fonts name. The layout auto-imports them.
# fonts:
#   post_heading:    "Cormorant Garamond"   # Big article titles
#   post_subheading: "Spectral"             # Sub-headings inside posts (h2, h3)
#   body:            "Spectral"             # All paragraph / body text
#   ui:              "DM Sans"              # Nav, buttons, tags, meta
#   mono:            "JetBrains Mono"       # Code blocks
fonts:
  post_heading:    "Caveat"
  post_subheading: "Kalam"
  body:            "Patrick Hand"
  ui:              "Architects Daughter"
  mono:            "JetBrains Mono"
  
font_sizes:
  post_heading:    "3.4rem"    # Hero title on post page
  card_heading:    "1.45rem"   # Title on cards in index / explore
  subheading:      "1.3rem"    # h2 inside posts
  body:            "1.1rem"    # Body paragraphs
  ui:              "0.88rem"   # Nav, tags, meta

# ─── COLORS (LIGHT MODE) ───────────────────────────────────────────
colors:
  primary:       "#4A4A4A"   # medium graphite — main actions
  primary_dark:  "#2E2E2E"   # deep pencil pressure (hover)
  bg:            "#FFFFFF"   # paper white background
  surface:       "#F5F5F5"   # light sketch shading (cards)
  text:          "#1A1A1A"   # near-black pencil outline
  text_muted:    "#8A8A8A"   # faded pencil strokes
  border:        "#E0E0E0"   # soft sketch boundary
  accent:        "#BDBDBD"   # highlight grey (like smudge/light shade)
  footer:        "#000000"   # strong charcoal finish

# ─── FEATURES ──────────────────────────────────────────────────────
show_reading_time: true    # Show "5 min read" on posts
show_tags:         true    # Show tags on cards
posts_per_page:    9       # Posts shown on homepage
default_image:     "/assets/images/default-cover.png"

Hameeda:
  name: "Hameeda Syed"
  bio:   'Hameeda Syed is a programme associate and freelance journalist by profession. She writes about conflict, religion and identity. She is a published poet. She is currently engaged in various youth-led initiatives addressing online discrimination and SRHR (Sexual and Reproductive Health Rights). She has a background in psychology, conflict analysis and social sciences research.'
  
